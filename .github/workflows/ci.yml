name: ci

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
    paths-ignore:
      - "k8s/**"

permissions:
  contents: read

jobs:
  build-test-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Maven package (skip tests for now)
        run: mvn -q -Dmaven.test.skip=true package

      - name: Trivy FS scan (repo)
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          format: table
          exit-code: "1"
          version: v0.69.3
          trivyignores: .trivyignore

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker build (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: false
          load: true
          tags: local/app:${{ github.sha }}

      - name: Trivy image scan
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: local/app:${{ github.sha }}
          severity: CRITICAL,HIGH
          format: table
          exit-code: "1"
          version: v0.69.3
          trivyignores: .trivyignore

  notify:
    needs: [build-test-scan]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Send Slack notification (success/failure)
        if: ${{ secrets.SLACK_WEBHOOK_URL != '' }}
        uses: slackapi/slack-github-action@v1.26.0
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        with:
          payload: |
            {
              "text": "CI `${{ github.repository }}` - `${{ github.workflow }}`: *${{ needs.build-test-scan.result }}*",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Workflow:* `${{ github.workflow }}`\n*Repo:* `${{ github.repository }}`\n*Branch:* `${{ github.ref_name }}`\n*Commit:* `${{ github.sha }}`\n*Result:* *${{ needs.build-test-scan.result }}*\n*Run:* <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|Open in GitHub Actions>"
                  }
                }
              ]
            }


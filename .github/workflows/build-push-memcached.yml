name: build-push-memcached

on:
  push:
    branches: ["main"]
    paths:
      - "docker/memcached/**"
    paths-ignore:
      - "k8s/**"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: k8s-bump-main
  cancel-in-progress: false

env:
  DOCKERHUB_NAMESPACE: "01061875164"
  IMAGE_REPO: "memcached"

jobs:
  build-push-and-bump:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute image tag
        id: vars
        run: |
          set -euo pipefail
          echo "image_tag=${GITHUB_SHA}-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}" >> "$GITHUB_OUTPUT"

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build (load for scan)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/memcached/Dockerfile
          push: false
          load: true
          tags: local/memcached:${{ github.sha }}

      - name: Trivy image scan (block on HIGH/CRITICAL)
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: local/memcached:${{ github.sha }}
          severity: CRITICAL,HIGH
          format: table
          exit-code: "1"
          version: v0.69.3
          trivyignores: .trivyignore

      - name: Push to Docker Hub (with provenance + SBOM)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/memcached/Dockerfile
          push: true
          provenance: true
          sbom: true
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          tags: |
            ${{ env.DOCKERHUB_NAMESPACE }}/${{ env.IMAGE_REPO }}:${{ steps.vars.outputs.image_tag }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Bump k8s image tag
        env:
          IMAGE_TAG: ${{ steps.vars.outputs.image_tag }}
        run: |
          set -euo pipefail
          npm install --no-fund --no-audit
          node --loader ts-node/esm .github/scripts/update-kustomize-images.ts \
            --file "k8s/kustomization.yaml" \
            --image-tag "$IMAGE_TAG" \
            --changed-repos "${IMAGE_REPO}"

      - name: Commit and push if changed
        env:
          IMAGE_TAG: ${{ steps.vars.outputs.image_tag }}
        run: |
          set -euo pipefail
          if git diff --quiet; then
            echo "No k8s changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/kustomization.yaml
          git commit -m "chore(k8s): bump memcached to ${IMAGE_TAG}"
          git pull --rebase origin main
          git push


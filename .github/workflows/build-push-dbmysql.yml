name: build-push-dbmysql

on:
  push:
    branches: ["main"]
    paths:
      - "docker/db/**"
      - "src/main/resources/db_backup.sql"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: k8s-bump-main
  cancel-in-progress: false

env:
  DOCKERHUB_NAMESPACE: "01061875164"
  IMAGE_REPO: "dbmysql"

jobs:
  build-push-and-bump:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute image tag
        id: vars
        run: |
          set -euo pipefail
          TAG="$(date -u +%Y%m%d-%H%M)-${GITHUB_SHA::7}"
          echo "image_tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build (load for scan)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/db/Dockerfile
          push: false
          load: true
          tags: local/mysql:${{ github.sha }}

      - name: Trivy image scan (block on HIGH/CRITICAL)
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: local/mysql:${{ github.sha }}
          severity: CRITICAL,HIGH
          format: table
          exit-code: "0"
          version: v0.69.3
          trivyignores: .trivyignore

      - name: Push to Docker Hub (with provenance + SBOM)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/db/Dockerfile
          push: true
          provenance: true
          sbom: true
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          tags: |
            ${{ env.DOCKERHUB_NAMESPACE }}/${{ env.IMAGE_REPO }}:${{ steps.vars.outputs.image_tag }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Bump k8s image tag
        env:
          IMAGE_TAG: ${{ steps.vars.outputs.image_tag }}
        run: |
          set -euo pipefail
          git pull --rebase origin main
          npm install --no-fund --no-audit
          node --loader ts-node/esm .github/scripts/update-kustomize-images.ts \
            --file "k8s/kustomization.yaml" \
            --image-tag "$IMAGE_TAG" \
            --changed-repos "${IMAGE_REPO}"

      - name: Commit and push if changed
        env:
          IMAGE_TAG: ${{ steps.vars.outputs.image_tag }}
        run: |
          set -euo pipefail
          if git diff --quiet; then
            echo "No k8s changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/kustomization.yaml
          git commit -m "chore(k8s): bump dbmysql to ${IMAGE_TAG}"
          git push

  notify:
    needs: [build-push-and-bump]
    # TODO: switch to Discord notification, then re-enable this job.
    if: ${{ false }}
    runs-on: ubuntu-latest
    env:
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
    steps:
      - name: Send Slack notification (success/failure)
        if: ${{ env.SLACK_WEBHOOK_URL != '' }}
        uses: slackapi/slack-github-action@v1.26.0
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        with:
          payload: |
            {
              "text": "Build/Push `${{ github.repository }}` - `${{ github.workflow }}`: *${{ needs.build-push-and-bump.result }}*",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Workflow:* `${{ github.workflow }}`\n*Repo:* `${{ github.repository }}`\n*Branch:* `${{ github.ref_name }}`\n*Commit:* `${{ github.sha }}`\n*Result:* *${{ needs.build-push-and-bump.result }}*\n*Run:* <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|Open in GitHub Actions>"
                  }
                }
              ]
            }


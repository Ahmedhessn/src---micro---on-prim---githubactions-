version: "3.9"

services:
  db01:
    build:
      context: .
      dockerfile: docker/db/Dockerfile
    container_name: db01
    environment:
      MYSQL_ROOT_PASSWORD: admin123
      MYSQL_USER: admin
      MYSQL_PASSWORD: admin123
      MYSQL_DATABASE: accounts
    volumes:
      - dbdata:/var/lib/mysql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-padmin123"]
      interval: 10s
      timeout: 5s
      retries: 10

  mc01:
    build:
      context: .
      dockerfile: docker/memcached/Dockerfile
    container_name: mc01
    ports:
      - "11211:11211"

  rmq01:
    build:
      context: .
      dockerfile: docker/rabbitmq/Dockerfile
    container_name: rmq01
    environment:
      RABBITMQ_DEFAULT_USER: test
      RABBITMQ_DEFAULT_PASS: test
    ports:
      - "5672:5672"
      - "15672:15672"

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: app
    depends_on:
      db01:
        condition: service_healthy
      mc01:
        condition: service_started
      rmq01:
        condition: service_started
    ports:
      - "8080:8080"

  web:
    build:
      context: .
      dockerfile: docker/nginx/Dockerfile
    container_name: web
    depends_on:
      - app
    ports:
      - "80:80"

volumes:
  dbdata:


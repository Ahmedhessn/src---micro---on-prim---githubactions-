apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
  namespace: vprofile
data:
  default.conf: |
    server {
      listen 80;
      server_name _;

      location / {
        proxy_pass http://apps:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
      }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx
  namespace: vprofile
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
    spec:
      containers:
        - name: nginx
          image: k8s-self-managed-503459125797-dev-nginx
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
          ports:
            - containerPort: 80
          volumeMounts:
            - name: cfg
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
          readinessProbe:
            tcpSocket:
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: cfg
          configMap:
            name: nginx-config
---
apiVersion: v1
kind: Service
metadata:
  name: nginx
  namespace: vprofile
spec:
  selector:
    app: nginx
  ports:
    - name: http
      port: 80
      targetPort: 80
  type: NodePort
  # If you install MetalLB, you can switch this back to LoadBalancer.
  # If you prefer fixed ports, keep NodePort and set nodePort explicitly:
  # ports:
  # - name: http
  #   port: 80
  #   targetPort: 80
  #   nodePort: 30080

